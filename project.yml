name: Writ
options:
  bundleIdPrefix: com.solstice
  deploymentTarget:
    iOS: "26.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "26.3"
  defaultConfig: Debug
  developmentLanguage: en
  useBaseInternationalization: true

settings:
  base:
    DEVELOPMENT_TEAM: L5C2VXW59R
    SWIFT_VERSION: "5.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CODE_SIGN_STYLE: Automatic

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"

targets:
  # ─── Main App (iOS + macOS) ───
  Writ:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Writ
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solstice.Writ
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "음성을 텍스트로 변환하기 위해 마이크 접근이 필요합니다."
        INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]: YES
        INFOPLIST_KEY_UIStatusBarStyle[sdk=iphoneos*]: UIStatusBarStyleDefault
        INFOPLIST_KEY_UIStatusBarStyle[sdk=iphonesimulator*]: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSMicrophoneUsageDescription[sdk=macosx*]: "음성을 텍스트로 변환하기 위해 마이크 접근이 필요합니다."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Writ/Info.plist
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_PREVIEWS: YES
        REGISTER_APP_GROUPS: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: [com.solstice.writ.transcribe]
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        LD_RUNPATH_SEARCH_PATHS[sdk=iphoneos*]: "@executable_path/Frameworks"
        LD_RUNPATH_SEARCH_PATHS[sdk=iphonesimulator*]: "@executable_path/Frameworks"
        LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]: "@executable_path/../Frameworks"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: WhisperKit
        product: TTSKit
      - target: WritWidgetExtension
        embed: true
        codeSign: true
        destinationFilters: [iOS]
        copy:
          destination: plugins
    entitlements:
      path: Writ/Writ.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.solstice.writ
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.solstice.Writ
        com.apple.developer.icloud-services:
          - CloudKit

  # ─── Widget Extension (Live Activity + Home Widget) ───
  WritWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WritWidgetExtension
        createIntermediateGroups: true
      - path: Writ/Core/Models/WritActivityAttributes.swift
      - path: Writ/Core/Utilities/AppGroupConstants.swift
      - path: Writ/AppIntents/LiveActivityIntents.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solstice.Writ.WritWidgetExtension
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: WritWidgetExtension/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: WritWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: WritWidgetExtension/WritWidgetExtension.entitlements

  # ─── Unit Tests ───
  WritTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WritTests
        createIntermediateGroups: true
    dependencies:
      - target: Writ
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solstice.Writ.WritTests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  # ─── Watch App ───
  WritWatch:
    type: application
    platform: watchOS
    sources:
      - path: WritWatch
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solstice.Writ.watchkitapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.solstice.Writ
        TARGETED_DEVICE_FAMILY: 4
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Writ:
    build:
      targets:
        Writ: all
        WritWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WritTests
    archive:
      config: Release
